<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="url(#gradient)" stroke="#4A90E2" stroke-width="4"/>

  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 购物车图标 -->
  <path d="M30 45L40 45L50 85L90 85L100 55L45 55" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 车轮 -->
  <circle cx="55" cy="95" r="8" fill="white"/>
  <circle cx="85" cy="95" r="8" fill="white"/>

  <!-- AI 标识 - 闪电 -->
  <path d="M65 30L55 55L70 55L60 80" stroke="#FFD700" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 分析图表 -->
  <rect x="75" y="25" width="8" height="20" rx="2" fill="white" opacity="0.8"/>
  <rect x="87" y="30" width="8" height="15" rx="2" fill="white" opacity="0.8"/>
  <rect x="99" y="20" width="8" height="25" rx="2" fill="white" opacity="0.8"/>

  <!-- 放大镜 -->
  <circle cx="105" cy="35" r="12" stroke="white" stroke-width="3" fill="none"/>
  <line x1="113" y1="43" x2="120" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>